name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. main @ abc1234
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - GitHub sync
        - Issue triage
        - PR summaries
        - Changelog
        - Documentation generator
        - GitHub write actions
        - Settings / Auth
        - Demo mode
        - Other
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues.
          required: true
        - label: I am not reporting a security vulnerability (those go to SECURITY.md).
          required: true
